<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Research Workflow Dashboard</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #ffffff;
        --surface: #ffffff;
        --line: #e5e5e7;
        --text: #111218;
        --subtext: #6f7177;
        --accent: #2f6fed;
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, sans-serif;
        background: var(--bg);
        color: var(--text);
      }

      .wrap {
        max-width: 920px;
        margin: 0 auto;
        padding: 0 16px 28px;
      }

      .header {
        border-bottom: 1px solid var(--line);
        padding: 16px 4px 14px;
      }

      .title {
        margin: 0 0 16px;
        text-align: center;
        font-size: clamp(1.25rem, 3vw, 1.5rem);
        line-height: 1.1;
        letter-spacing: -0.02em;
      }

      .tabs {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }

      .tab-btn {
        border: 1px solid var(--line);
        background: #f3f3f4;
        color: #40424a;
        border-radius: 999px;
        padding: 8px 14px;
        font-weight: 600;
        font-size: 0.9rem;
        cursor: pointer;
        transition: 140ms ease;
      }

      .tab-btn:hover,
      .tab-btn:focus-visible {
        border-color: #ccd7ff;
        color: #1c2a57;
      }

      .tab-btn.active {
        border-color: transparent;
        background: var(--accent);
        color: #fff;
      }

      .tab {
        display: none;
        padding: 8px 4px 20px;
      }

      .tab.active { display: block; }

      .list-item {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 12px;
        border-bottom: 1px solid var(--line);
        padding: 14px 0;
        color: inherit;
      }

      a.list-item {
        text-decoration: none;
      }

      a.list-item:hover .item-title,
      a.list-item:focus-visible .item-title {
        text-decoration: underline;
        text-underline-offset: 0.12em;
      }

      .list-item-actions {
        margin-top: 10px;
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }

      .inline-action {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 34px;
        padding: 6px 10px;
        border-radius: 999px;
        border: 1px solid var(--line);
        background: #fff;
        color: var(--text);
        text-decoration: none;
        font-size: 0.84rem;
        font-weight: 600;
      }

      .inline-action:hover,
      .inline-action:focus-visible {
        border-color: #ccd7ff;
      }

      .list-item:last-child { border-bottom: 0; }

      .item-title {
        margin: 0;
        font-size: 1.35rem;
        line-height: 1.2;
        letter-spacing: -0.015em;
      }

      .item-sub,
      .item-meta {
        margin: 3px 0 0;
        color: var(--subtext);
      }

      .item-time {
        align-self: end;
        color: #8f9197;
        font-size: 0.95rem;
      }

      .trend {
        border-bottom: 1px solid var(--line);
        padding: 14px 0;
      }

      .trend:last-child { border-bottom: 0; }

      .trend h3 {
        margin: 0 0 8px;
        font-size: 1.2rem;
      }

      .rank {
        display: inline-block;
        min-width: 2ch;
        margin-right: 8px;
        color: var(--accent);
      }

      .source-thread {
        margin: 0;
        padding-left: 24px;
        color: var(--subtext);
      }

      .source-thread li { margin: 6px 0; }

      .sources-list {
        margin-top: 8px;
        padding-left: 20px;
      }

      .sources-list li { margin: 6px 0; }

      .feedback-row {
        margin-top: 10px;
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }

      .feedback-btn {
        border: 1px solid var(--line);
        background: #f5f6f8;
        border-radius: 10px;
        padding: 6px 10px;
        font-size: 0.85rem;
        font-weight: 600;
        cursor: pointer;
      }

      .feedback-btn:hover,
      .feedback-btn:focus-visible {
        border-color: #ccd7ff;
      }

      .feedback-note {
        margin: 8px 0 0;
        color: var(--subtext);
        font-size: 0.9rem;
      }

      .status-grid {
        display: grid;
        gap: 12px;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        padding: 8px 0;
      }

      .status-card {
        border: 1px solid var(--line);
        border-radius: 14px;
        padding: 14px;
        background: #fafafb;
      }

      .status-label {
        margin: 0;
        color: var(--subtext);
        font-size: 0.88rem;
      }

      .status-value {
        margin: 4px 0 0;
        font-size: 1.12rem;
        font-weight: 700;
      }

      .status-subvalue {
        margin: 6px 0 0;
        color: var(--subtext);
        font-size: 0.93rem;
      }

      .run-controls {
        margin-top: 8px;
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .run-step-btn {
        border: 1px solid var(--line);
        background: #fff;
        border-radius: 8px;
        padding: 6px 10px;
        font-size: 0.86rem;
        font-weight: 600;
        cursor: pointer;
      }

      .run-step-btn:disabled {
        opacity: 0.55;
        cursor: not-allowed;
      }

      .step-run-block {
        margin-top: 12px;
        border-top: 1px solid var(--line);
        padding-top: 10px;
      }

      .step-run-log {
        margin-top: 6px;
        background: #111827;
        color: #e5e7eb;
        border-radius: 8px;
        padding: 8px;
        max-height: 120px;
        overflow: auto;
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
        font-size: 0.75rem;
        white-space: pre-wrap;
      }

      /* ── Badges ── */
      .badge {
        display: inline-block;
        padding: 2px 8px;
        border-radius: 6px;
        font-size: 0.78rem;
        font-weight: 600;
        letter-spacing: 0.01em;
      }
      .badge-rss { background: #e8f0fe; color: #1a56db; }
      .badge-trafilatura { background: #d1fae5; color: #065f46; }
      .badge-readability { background: #fef3c7; color: #92400e; }
      .badge-html_strip { background: #fee2e2; color: #991b1b; }
      .badge-fallback { background: #f3f4f6; color: #6b7280; }
      .badge-youtube { background: #fce7f3; color: #9d174d; }

      .badge-pending { background: #fef3c7; color: #92400e; }
      .badge-reported { background: #d1fae5; color: #065f46; }
      .badge-needs_more_evidence { background: #e0f2fe; color: #075985; }
      .badge-skipped { background: #f3f4f6; color: #6b7280; }

      .badge-novelty-high { background: #d1fae5; color: #065f46; }
      .badge-novelty-mid { background: #fef3c7; color: #92400e; }
      .badge-novelty-low { background: #fee2e2; color: #991b1b; }
      .badge-step-idle { background: #f3f4f6; color: #6b7280; }
      .badge-step-running { background: #dbeafe; color: #1d4ed8; }
      .badge-step-success { background: #d1fae5; color: #065f46; }
      .badge-step-failed { background: #fee2e2; color: #991b1b; }

      /* ── Score breakdown bar ── */
      .score-breakdown {
        display: flex;
        gap: 6px;
        align-items: center;
        flex-wrap: wrap;
        margin: 4px 0;
        font-size: 0.85rem;
      }
      .score-breakdown .score-part {
        padding: 2px 6px;
        border-radius: 4px;
        background: #f0f1f3;
        font-weight: 500;
        white-space: nowrap;
      }
      .score-breakdown .score-part.positive { background: #d1fae5; color: #065f46; }
      .score-breakdown .score-part.negative { background: #fee2e2; color: #991b1b; }
      .score-breakdown .score-total {
        font-weight: 700;
        font-size: 1rem;
      }

      /* ── Pattern card ── */
      .pattern-card {
        border-bottom: 1px solid var(--line);
        padding: 12px 0;
      }
      .pattern-card:last-child { border-bottom: 0; }
      .pattern-header {
        display: flex;
        gap: 8px;
        align-items: baseline;
        flex-wrap: wrap;
      }
      .pattern-actor { font-weight: 700; color: var(--accent); }
      .pattern-action { font-weight: 600; }
      .pattern-meta {
        margin: 4px 0 0;
        color: var(--subtext);
        font-size: 0.9rem;
      }
      .pattern-context {
        margin: 6px 0 0;
        padding: 8px 12px;
        background: #f8f9fa;
        border-radius: 8px;
        font-size: 0.88rem;
        color: #374151;
        line-height: 1.45;
      }

      /* ── Debug section ── */
      .debug-section {
        margin-top: 24px;
        padding-top: 16px;
        border-top: 2px solid var(--line);
      }
      .debug-section h2 {
        margin: 0 0 12px;
        font-size: 1.1rem;
        color: var(--subtext);
        text-transform: uppercase;
        letter-spacing: 0.05em;
      }
      .debug-table {
        width: 100%;
        border-collapse: collapse;
        font-size: 0.9rem;
      }
      .debug-table th {
        text-align: left;
        padding: 6px 8px;
        border-bottom: 2px solid var(--line);
        color: var(--subtext);
        font-weight: 600;
      }
      .debug-table td {
        padding: 6px 8px;
        border-bottom: 1px solid var(--line);
      }
      .debug-table tr:last-child td { border-bottom: 0; }

      .ingest-detail-row {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        align-items: center;
        margin-top: 4px;
      }
    </style>
  </head>
  <body>
    <main class="wrap">
      <header class="header">
        <h1 class="title">Research Dashboard</h1>
        <nav class="tabs" aria-label="Dashboard tabs">
          <button class="tab-btn active" data-tab="logs">Logs</button>
          <button class="tab-btn" data-tab="ingest">Ingest</button>
          <button class="tab-btn" data-tab="detect">Detect</button>
          <button class="tab-btn" data-tab="patterns">Patterns</button>
          <button class="tab-btn" data-tab="reports">Reports</button>
          <button class="tab-btn" data-tab="status">Status</button>
        </nav>
      </header>

      <section id="logs" class="tab active" aria-live="polite"></section>
      <section id="ingest" class="tab"></section>
      <section id="detect" class="tab"></section>
      <section id="patterns" class="tab"></section>
      <section id="reports" class="tab"></section>
      <section id="status" class="tab"></section>
    </main>

    <script>
      const truncate = (text, length = 255) =>
        text.length > length ? `${text.slice(0, length)}…` : text;

      const safeText = (value, fallback = "") => (value == null || value === "" ? fallback : String(value));
      const escapeHtml = (value) => String(value)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('\"', '&quot;')
        .replaceAll("'", '&#39;');

      const formatIsoTime = (value) => {
        if (!value) return "—";
        const dt = new Date(value);
        if (Number.isNaN(dt.getTime())) return value;
        return dt.toLocaleString();
      };

      const renderEmpty = (container, title, detail = "") => {
        container.innerHTML = `<article class="list-item"><div><h2 class="item-title">${title}</h2><p class="item-sub">${detail}</p></div><span class="item-time">—</span></article>`;
      };

      const logsEl = document.getElementById("logs");
      const ingestEl = document.getElementById("ingest");
      const detectEl = document.getElementById("detect");
      const patternsEl = document.getElementById("patterns");
      const reportsEl = document.getElementById("reports");
      const statusEl = document.getElementById("status");

      const createListItem = ({ href = "", targetBlank = false, bodyHtml = "", timeHtml = "—" }) => {
        const tag = href ? "a" : "article";
        const attrs = href
          ? ` class="list-item" href="${escapeHtml(href)}"${targetBlank ? ' target="_blank" rel="noreferrer"' : ""}`
          : ` class="list-item"`;
        return `<${tag}${attrs}>${bodyHtml}<span class="item-time">${timeHtml}</span></${tag}>`;
      };

      const extractionBadge = (method) => {
        const cls = `badge badge-${method || 'fallback'}`;
        return `<span class="${cls}">${escapeHtml(method || 'rss')}</span>`;
      };

      const statusBadge = (status) => {
        const cls = `badge badge-${status || 'pending'}`;
        return `<span class="${cls}">${escapeHtml((status || 'pending').replaceAll('_', ' '))}</span>`;
      };

      const noveltyBadge = (score) => {
        if (score == null) return '<span class="badge badge-fallback">no novelty data</span>';
        let cls = 'badge-novelty-mid';
        let label = `${(score * 100).toFixed(0)}%`;
        if (score >= 0.7) cls = 'badge-novelty-high';
        else if (score < 0.3) cls = 'badge-novelty-low';
        return `<span class="badge ${cls}">novelty ${label}</span>`;
      };

      const formatNumber = (n) => {
        if (n == null) return "—";
        return Number(n).toLocaleString();
      };

      const renderLogs = (items) => {
        logsEl.innerHTML = "";
        if (!items.length) {
          renderEmpty(logsEl, "No workflow events yet", "Run ingest/detect/report steps to populate logs.");
          return;
        }

        items.forEach((item) => {
          logsEl.insertAdjacentHTML(
            "beforeend",
            `<article class="list-item"><div><h2 class="item-title">${safeText(item.event, "Event")}</h2><p class="item-sub">${truncate(safeText(item.detail, ""))}</p></div><span class="item-time">${formatIsoTime(item.time)}</span></article>`
          );
        });
      };

      const renderIngestItems = (items) => {
        ingestEl.innerHTML = "";
        if (!items.length) {
          renderEmpty(ingestEl, "No ingested items yet", "Run ingest to populate this tab.");
          return;
        }

        items.forEach((item) => {
          const hasUrl = Boolean(item.url);
          const detailParts = [];
          if (item.author) detailParts.push(`by ${escapeHtml(item.author)}`);
          if (item.sitename) detailParts.push(escapeHtml(item.sitename));
          if (item.publish_date) detailParts.push(`published ${item.publish_date}`);
          if (item.content_length) detailParts.push(`${formatNumber(item.content_length)} chars`);
          const detailLine = detailParts.length ? detailParts.join(' · ') : '';

          ingestEl.insertAdjacentHTML(
            "beforeend",
            createListItem({
              href: hasUrl ? item.url : "",
              targetBlank: hasUrl,
              bodyHtml:
                `<div>` +
                `<h2 class="item-title">${safeText(item.title, "Untitled")}</h2>` +
                `<p class="item-sub">${truncate(safeText(item.description, ""))}</p>` +
                `<div class="ingest-detail-row">` +
                `<span class="badge badge-${item.source_type === 'youtube' ? 'youtube' : 'rss'}">${escapeHtml(item.source_type || 'unknown')}</span>` +
                extractionBadge(item.extraction_method) +
                (detailLine ? `<span style="color:var(--subtext);font-size:0.85rem">${detailLine}</span>` : '') +
                `</div>` +
                `</div>`,
              timeHtml: formatIsoTime(item.created_at),
            })
          );
        });
      };

      const submitTrendFeedback = async (trendCandidateId, feedback, buttonEl) => {
        const priorText = buttonEl.textContent;
        buttonEl.disabled = true;
        buttonEl.textContent = "Saving...";

        try {
          const response = await fetch("/api/trend-feedback", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ trend_candidate_id: trendCandidateId, feedback }),
          });
          const payload = await response.json();
          if (!response.ok || !payload.ok) {
            throw new Error(payload.error || "Could not save feedback");
          }
          await loadDashboard();
        } catch (error) {
          buttonEl.textContent = "Try again";
          alert(`Feedback failed: ${error.message}`);
        } finally {
          buttonEl.disabled = false;
          if (buttonEl.textContent !== "Try again") {
            buttonEl.textContent = priorText;
          }
        }
      };

      const renderDetect = (items) => {
        detectEl.innerHTML = "";
        if (!items.length) {
          renderEmpty(detectEl, "No detected trends yet", "Run detect to populate this tab.");
          return;
        }

        items.forEach((item, index) => {
          const sources = Array.isArray(item.sources) ? item.sources : [];
          const sourcesHtml = sources.length
            ? `<li><strong>Supporting sources (${sources.length})</strong><ul class="sources-list">${sources
                .map((source) => `<li>${source.url ? `<a href="${escapeHtml(source.url)}" target="_blank" rel="noreferrer">${escapeHtml(safeText(source.title, "Untitled source"))}</a>` : escapeHtml(safeText(source.title, "Untitled source"))}</li>`)
                .join("")}</ul></li>`
            : "<li><strong>Supporting sources</strong>: none linked by detection model yet.</li>";

          // Score breakdown
          const feedbackAdj = item.feedback_adjustment || 0;
          const feedbackClass = feedbackAdj > 0 ? 'positive' : feedbackAdj < 0 ? 'negative' : '';
          const noveltyVal = item.novelty_score;
          const noveltyAdj = noveltyVal != null ? Math.round((noveltyVal - 0.5) * 30) : 0;
          const noveltyClass = noveltyAdj > 0 ? 'positive' : noveltyAdj < 0 ? 'negative' : '';

          detectEl.insertAdjacentHTML(
            "beforeend",
            `<article class="trend" data-trend-id="${item.id}">` +
            `<h3><span class="rank">#${index + 1}</span>${escapeHtml(safeText(item.trend, "Untitled trend"))}</h3>` +
            `<div class="score-breakdown">` +
            `<span class="score-total">${safeText(item.score, "—")}</span>` +
            `<span class="score-part">base: ${safeText(item.base_score, "—")}</span>` +
            (feedbackAdj !== 0 ? `<span class="score-part ${feedbackClass}">feedback: ${feedbackAdj > 0 ? '+' : ''}${feedbackAdj}</span>` : '') +
            (noveltyVal != null ? `<span class="score-part ${noveltyClass}">novelty: ${noveltyAdj > 0 ? '+' : ''}${noveltyAdj}</span>` : '') +
            `</div>` +
            `<div style="margin:6px 0;display:flex;gap:8px;flex-wrap:wrap">` +
            statusBadge(item.status) +
            noveltyBadge(item.novelty_score) +
            (item.source_diversity ? `<span class="badge badge-rss">${item.source_diversity} sources</span>` : '') +
            `</div>` +
            `<ul class="source-thread">` +
            `<li>Detected: ${formatIsoTime(item.detected_at)}</li>` +
            (item.reasoning ? `<li>${escapeHtml(truncate(item.reasoning))}</li>` : '') +
            sourcesHtml +
            `</ul>` +
            `<div class="feedback-row">` +
            `<button class="feedback-btn" data-feedback="important">Important</button>` +
            `<button class="feedback-btn" data-feedback="not_important">Not important</button>` +
            `</div>` +
            `<p class="feedback-note">Your feedback influences future detect scoring.</p>` +
            `</article>`
          );
        });

        detectEl.querySelectorAll(".feedback-btn").forEach((button) => {
          button.addEventListener("click", () => {
            const article = button.closest(".trend");
            submitTrendFeedback(article?.dataset.trendId, button.dataset.feedback, button);
          });
        });
      };

      const renderPatterns = (items) => {
        patternsEl.innerHTML = "";
        if (!items.length) {
          renderEmpty(patternsEl, "No tactical patterns yet", "Patterns are extracted during ingest from tactically-rich chunks.");
          return;
        }

        patternsEl.insertAdjacentHTML("beforeend",
          `<p style="color:var(--subtext);margin:8px 0 16px;font-size:0.9rem">` +
          `${items.length} most recent tactical patterns (actor → action → zone/phase) extracted from ingested articles.</p>`
        );

        items.forEach((item) => {
          const zones = (item.zones || []).map(z => escapeHtml(z)).join(', ');
          patternsEl.insertAdjacentHTML("beforeend",
            `<article class="pattern-card">` +
            `<div class="pattern-header">` +
            `<span class="pattern-actor">${escapeHtml(item.actor || '?')}</span>` +
            `<span style="color:var(--subtext)">→</span>` +
            `<span class="pattern-action">${escapeHtml(item.action || '?')}</span>` +
            (zones ? `<span style="color:var(--subtext)">in</span><span>${zones}</span>` : '') +
            (item.phase ? `<span style="color:var(--subtext)">during</span><span>${escapeHtml(item.phase)}</span>` : '') +
            `</div>` +
            `<div class="pattern-meta">` +
            (item.source_url
              ? `<a href="${escapeHtml(item.source_url)}" target="_blank" rel="noreferrer">${escapeHtml(item.source_title)}</a>`
              : escapeHtml(item.source_title)) +
            ` · ${formatIsoTime(item.created_at)}` +
            `</div>` +
            (item.context ? `<div class="pattern-context">"${escapeHtml(truncate(item.context, 200))}"</div>` : '') +
            `</article>`
          );
        });
      };

      const renderReports = (items) => {
        reportsEl.innerHTML = "";
        if (!items.length) {
          renderEmpty(reportsEl, "No reports yet", "Run report generation to populate this tab.");
          return;
        }

        items.forEach((report) => {
          const viewUrl = report.view_url || "";
          const externalUrl = report.external_url || "";
          const meta = report.metadata || {};
          const metaParts = [];
          if (meta.complexity) metaParts.push(`complexity: ${meta.complexity}`);
          if (meta.total_chunks) metaParts.push(`${meta.total_chunks} chunks`);
          if (meta.research_rounds) metaParts.push(`${meta.research_rounds} rounds`);
          if (meta.angles && meta.angles.length) metaParts.push(`${meta.angles.length} angles`);
          const metaLine = metaParts.join(' · ');

          reportsEl.insertAdjacentHTML(
            "beforeend",
            createListItem({
              bodyHtml:
                `<div>` +
                `<h2 class="item-title">${viewUrl ? `<a href="${escapeHtml(viewUrl)}" target="_blank" rel="noreferrer">${safeText(report.title, "Untitled report")}</a>` : safeText(report.title, "Untitled report")}</h2>` +
                `<p class="item-sub">${truncate(safeText(report.description, ""))}</p>` +
                (metaLine ? `<p class="item-meta">${escapeHtml(metaLine)}</p>` : '') +
                `<div class="list-item-actions">` +
                (viewUrl ? `<a class="inline-action" href="${escapeHtml(viewUrl)}" target="_blank" rel="noreferrer">Open report</a>` : '') +
                (report.id != null ? `<a class="inline-action" href="/api/reports/${encodeURIComponent(report.id)}/raw" target="_blank" rel="noreferrer">Raw markdown</a>` : '') +
                (externalUrl ? `<a class="inline-action" href="${escapeHtml(externalUrl)}" target="_blank" rel="noreferrer">External link</a>` : '') +
                `</div>` +
                `</div>`,
              timeHtml: formatIsoTime(report.created_at),
            })
          );
        });
      };

      const formatCountdown = (milliseconds) => {
        const totalSeconds = Math.max(0, Math.floor(milliseconds / 1000));
        const hours = Math.floor(totalSeconds / 3600);
        const minutes = Math.floor((totalSeconds % 3600) / 60);
        const seconds = totalSeconds % 60;

        if (hours > 0) {
          return `${hours}h ${minutes}m ${seconds}s`;
        }
        return `${minutes}m ${seconds}s`;
      };

      const getNextRunForSchedule = (name, now = new Date()) => {
        const next = new Date(now);
        next.setSeconds(0, 0);

        if (name === "ingest") {
          next.setMinutes(0);
          next.setHours(now.getHours() + 1);
          return next;
        }

        if (name === "detect") {
          const nextBlockHour = Math.ceil((now.getHours() + 1) / 6) * 6;
          next.setMinutes(0);
          if (nextBlockHour >= 24) {
            next.setDate(next.getDate() + 1);
            next.setHours(nextBlockHour - 24);
          } else {
            next.setHours(nextBlockHour);
          }
          return next;
        }

        // report: daily at 01:00
        next.setHours(1, 0, 0, 0);
        if (now >= next) {
          next.setDate(next.getDate() + 1);
        }
        return next;
      };

      let statusCountdownTimer = null;
      let dashboardRefreshTimer = null;

      const renderScheduleCards = () => {
        const now = new Date();
        const schedules = [
          { key: "ingest", label: "Next ingest" },
          { key: "detect", label: "Next detect" },
          { key: "report", label: "Next report" },
        ];

        schedules.forEach((schedule) => {
          const nextRun = getNextRunForSchedule(schedule.key, now);
          const timeEl = statusEl.querySelector(`[data-next-time="${schedule.key}"]`);
          const countdownEl = statusEl.querySelector(`[data-next-countdown="${schedule.key}"]`);
          if (timeEl) {
            timeEl.textContent = formatIsoTime(nextRun.toISOString());
          }
          if (countdownEl) {
            countdownEl.textContent = `Countdown: ${formatCountdown(nextRun - now)}`;
          }
        });
      };

      const renderDebugSection = (debug) => {
        if (!debug) return '';

        let html = '<div class="debug-section"><h2>Pipeline Debug</h2>';

        // Counts overview
        if (debug.counts) {
          html += '<table class="debug-table"><thead><tr><th>Store</th><th>Count</th></tr></thead><tbody>';
          for (const [key, val] of Object.entries(debug.counts)) {
            html += `<tr><td>${escapeHtml(key.replace(/_/g, ' '))}</td><td>${formatNumber(val)}</td></tr>`;
          }
          html += '</tbody></table>';
        }

        // Extraction method breakdown
        if (debug.extraction_breakdown && Object.keys(debug.extraction_breakdown).length) {
          html += '<h3 style="margin:16px 0 8px;font-size:0.95rem;color:var(--subtext)">Extraction Methods</h3>';
          html += '<table class="debug-table"><thead><tr><th>Method</th><th>Sources</th><th>Avg Content Length</th></tr></thead><tbody>';
          for (const [method, count] of Object.entries(debug.extraction_breakdown)) {
            const avgLen = debug.avg_content_length?.[method];
            html += `<tr><td>${extractionBadge(method)}</td><td>${formatNumber(count)}</td><td>${avgLen ? formatNumber(avgLen) + ' chars' : '—'}</td></tr>`;
          }
          html += '</tbody></table>';
        }

        // Source type breakdown
        if (debug.source_type_breakdown && Object.keys(debug.source_type_breakdown).length) {
          html += '<h3 style="margin:16px 0 8px;font-size:0.95rem;color:var(--subtext)">Source Types</h3>';
          html += '<table class="debug-table"><thead><tr><th>Type</th><th>Count</th></tr></thead><tbody>';
          for (const [type, count] of Object.entries(debug.source_type_breakdown)) {
            html += `<tr><td>${escapeHtml(type)}</td><td>${formatNumber(count)}</td></tr>`;
          }
          html += '</tbody></table>';
        }

        // Pipeline state
        if (debug.pipeline_state && Object.keys(debug.pipeline_state).length) {
          html += '<h3 style="margin:16px 0 8px;font-size:0.95rem;color:var(--subtext)">Pipeline State</h3>';
          html += '<table class="debug-table"><thead><tr><th>Key</th><th>Value</th></tr></thead><tbody>';
          for (const [key, val] of Object.entries(debug.pipeline_state)) {
            html += `<tr><td style="font-family:monospace;font-size:0.85rem">${escapeHtml(key)}</td><td>${escapeHtml(val)}</td></tr>`;
          }
          html += '</tbody></table>';
        }

        html += '</div>';
        return html;
      };

      const stepRunBadge = (status) => {
        const value = (status || "idle").toLowerCase();
        const cls = ["idle", "running", "success", "failed"].includes(value) ? value : "idle";
        return `<span class="badge badge-step-${cls}">${escapeHtml(value)}</span>`;
      };

      const runLabels = {
        ingest: "ingest",
        detect: "detect",
        rescore: "rescore historical trends",
        report: "report",
        detect_policy_eval: "detect policy eval",
        detect_policy_optimize: "detect policy optimize",
      };

      const triggerStepRun = async (step) => {
        try {
          const response = await fetch("/api/run-step", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ step }),
          });
          const payload = await response.json();
          if (!response.ok) {
            throw new Error(payload.error || "Failed to trigger step");
          }
          await loadDashboard();
        } catch (error) {
          alert(`Unable to trigger ${step}: ${error.message}`);
        }
      };

      const renderStatus = (items, debug, stepRuns) => {
        const scheduleCards = [
          { key: "ingest", label: "Next ingest" },
          { key: "detect", label: "Next detect" },
          { key: "report", label: "Next report" },
        ];

        const runEntries = ["ingest", "detect", "rescore", "report", "detect_policy_eval", "detect_policy_optimize"].map((name) => ({
          name,
          data: stepRuns?.[name] || { status: "idle" },
        }));
        const isAnyRunning = runEntries.some((entry) => (entry.data?.status || "").toLowerCase() === "running");

        const runtimeCards = items.length
          ? items
          .map(
            (entry) =>
              `<section class="status-card"><p class="status-label">${safeText(entry.label, "Unknown")}</p><p class="status-value">${safeText(entry.value, "Unknown")}</p></section>`
          )
          .join("")
          : `<section class="status-card"><p class="status-label">Runtime status</p><p class="status-value">No status available</p><p class="status-subvalue">No runtime status data was returned.</p></section>`;

        statusEl.innerHTML = `<div class="status-grid">${scheduleCards
          .map(
            (entry) =>
              `<section class="status-card"><p class="status-label">${entry.label}</p><p class="status-value" data-next-time="${entry.key}">—</p><p class="status-subvalue" data-next-countdown="${entry.key}">Countdown: —</p></section>`
          )
          .join("")}${runtimeCards}
          <section class="status-card">
            <p class="status-label">Manual runs</p>
            <p class="status-subvalue">Run ingest, detect, rescore past trends, report, a local detect-policy test, or an auto-tuning pass from the dashboard.</p>
            <div class="run-controls">
              ${["ingest", "detect", "rescore", "report", "detect_policy_eval", "detect_policy_optimize"].map((step) => `<button class="run-step-btn" data-run-step="${step}" ${isAnyRunning ? "disabled" : ""}>${step === "detect_policy_eval" ? "Test detect policy" : step === "detect_policy_optimize" ? "Tune detect policy" : step === "rescore" ? "Rescore past trends" : `Run ${step}`}</button>`).join("")}
            </div>
            ${runEntries.map((entry) => `
              <div class="step-run-block">
                <p class="status-label" style="margin-bottom:4px;text-transform:capitalize">${escapeHtml(runLabels[entry.name] || entry.name)} ${stepRunBadge(entry.data?.status || "idle")}</p>
                <p class="status-subvalue">Started: ${safeText(formatIsoTime(entry.data?.started_at), "—")}</p>
                <p class="status-subvalue">Finished: ${safeText(formatIsoTime(entry.data?.finished_at), "—")}</p>
                <p class="status-subvalue">Exit code: ${entry.data?.exit_code == null ? "—" : escapeHtml(String(entry.data.exit_code))}</p>
                ${entry.data?.log_tail ? `<div class="step-run-log">${escapeHtml(entry.data.log_tail)}</div>` : ""}
              </div>
            `).join("")}
          </section>
          </div>${renderDebugSection(debug)}`;

        statusEl.querySelectorAll(".run-step-btn").forEach((button) => {
          button.addEventListener("click", () => triggerStepRun(button.dataset.runStep));
        });

        renderScheduleCards();
        if (statusCountdownTimer) {
          clearInterval(statusCountdownTimer);
        }
        statusCountdownTimer = setInterval(renderScheduleCards, 1000);
      };

      const loadDashboard = async () => {
        try {
          const response = await fetch("/api/dashboard");
          const payload = await response.json();

          if (!response.ok) {
            throw new Error(payload.warning || "Failed to load dashboard data");
          }

          renderLogs(payload.logs || []);
          renderIngestItems(payload.ingest || []);
          renderDetect(payload.detect || []);
          renderPatterns(payload.patterns || []);
          renderReports(payload.reports || []);
          renderStatus(payload.status || [], payload.debug || null, payload.step_runs || {});

          if (payload.warning) {
            logsEl.insertAdjacentHTML(
              "afterbegin",
              `<article class="list-item"><div><h2 class="item-title">Warning</h2><p class="item-sub">${payload.warning}</p></div><span class="item-time">!</span></article>`
            );
          }
        } catch (error) {
          renderEmpty(logsEl, "Unable to load logs", error.message);
          renderEmpty(ingestEl, "Unable to load ingested items", error.message);
          renderEmpty(detectEl, "Unable to load detected trends", error.message);
          renderEmpty(patternsEl, "Unable to load patterns", error.message);
          renderEmpty(reportsEl, "Unable to load reports", error.message);
          renderEmpty(statusEl, "Unable to load status", error.message);
        }
      };

      const activateTab = (tabName) => {
        const target = document.getElementById(tabName) ? tabName : "logs";
        const tabs = [...document.querySelectorAll(".tab-btn")];
        tabs.forEach((el) => el.classList.toggle("active", el.dataset.tab === target));
        document.querySelectorAll(".tab").forEach((el) => el.classList.toggle("active", el.id === target));
      };

      const loadInitialTab = () => {
        const hashValue = (window.location.hash || "").replace(/^#/, "");
        activateTab(hashValue || "logs");
      };

      loadInitialTab();
      loadDashboard();
      dashboardRefreshTimer = setInterval(loadDashboard, 15000);

      const tabs = [...document.querySelectorAll(".tab-btn")];
      tabs.forEach((btn) => {
        btn.addEventListener("click", () => {
          const tabName = btn.dataset.tab;
          activateTab(tabName);
          window.history.replaceState(null, "", `#${tabName}`);
        });
      });

      window.addEventListener("hashchange", loadInitialTab);
    </script>

  </body>
</html>
